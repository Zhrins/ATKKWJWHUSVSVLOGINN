<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>File Admin MDC</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Patrick+Hand&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Patrick Hand', cursive;
            background-color: #fdfaf6;
            background-image: repeating-linear-gradient(transparent, transparent 31px, #60a5fa 31px, #60a5fa 32px);
            background-attachment: local;
        }
        .doodle-card {
            border: 3px solid #1f2937;
            border-radius: 15px 225px 15px 255px/255px 15px 225px 15px;
            background-color: #ffffff;
            box-shadow: 6px 6px 0px #1f2937;
        }
        .doodle-btn {
            border: 2px solid #1f2937;
            border-radius: 255px 15px 225px 15px/15px 225px 15px 255px;
        }
    </style>
</head>
<body class="p-8">

    <div class="max-w-6xl mx-auto">
        <div class="flex justify-between items-center mb-8 border-b-4 border-gray-800 border-dashed pb-4 bg-white p-4 doodle-card">
            <h1 class="text-4xl font-bold">Brankas Data MDC</h1>
            <button onclick="fetchData()" class="doodle-btn bg-green-400 px-6 py-2 font-bold text-xl shadow-[4px_4px_0px_#1f2937] active:shadow-none active:translate-y-1">
                🔄 Tarik Data Backend
            </button>
        </div>

        <div id="dataContainer" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'https://ertvtbcuqsjrejfmokxf.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVydHZ0YmN1cXNqcmVqZm1va3hmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIyNzA1ODAsImV4cCI6MjA5Nzg0NjU4MH0.K3PD45Rerd72zei_JSA0Cuj1CYjqXrdcDJZwRJpHH5U';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const dataContainer = document.getElementById('dataContainer');

        async function fetchData() {
            dataContainer.innerHTML = '<h2 class="text-2xl font-bold col-span-full text-center">⏳ Ngambil data dari Supabase...</h2>';
            
            // GET data dari backend database
            const { data, error } = await supabaseClient
                .from('pengumpulan_data')
                .select('*')
                .order('created_at', { ascending: false });

            if (error) {
                dataContainer.innerHTML = `<h2 class="text-xl text-red-500 col-span-full">Error: ${error.message}</h2>`;
                return;
            }

            dataContainer.innerHTML = ''; 

            data.forEach(item => {
                // Ambil link download dari backend storage
                const fileUrl = supabaseClient.storage.from('berkas_pramuka').getPublicUrl(item.file_url).data.publicUrl;
                const tanggal = new Date(item.created_at).toLocaleString('id-ID');

                const card = document.createElement('div');
                card.className = 'doodle-card p-5 flex flex-col justify-between';
                card.innerHTML = `
                    <div>
                        <div class="flex justify-between border-b-2 border-gray-300 mb-2 pb-2">
                            <h2 class="text-2xl font-bold capitalize">${item.nama}</h2>
                            <span class="bg-yellow-200 border-2 border-black px-2 font-bold rounded">${item.seksi}</span>
                        </div>
                        <p class="text-sm text-gray-500 mb-2">🕒 ${tanggal}</p>
                        <p class="text-lg bg-gray-100 p-2 border-2 border-gray-300 min-h-[60px] mb-4">${item.keterangan || '-'}</p>
                    </div>
                    
                    <div class="flex gap-2 mt-auto">
                        <a href="${fileUrl}" target="_blank" class="w-1/2 text-center doodle-btn bg-blue-400 py-2 font-bold shadow-[2px_2px_0px_#1f2937]">👁️ Lihat</a>
                        
                        <a href="${fileUrl}?download=" download class="w-1/2 text-center doodle-btn bg-green-400 py-2 font-bold shadow-[2px_2px_0px_#1f2937]">💾 Download</a>
                    </div>
                `;
                dataContainer.appendChild(card);
            });
        }

        fetchData();
    </script>
</body>
</html>
